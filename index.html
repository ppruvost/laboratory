<!-- Conteneur pour les iframes -->
<div id="iframe-container" style="display: none; width: 100%; height: 70vh; border: none; margin-bottom: 20px;"></div>

<!-- =============================== -->
<!-- SECTIONS (toutes masquées par défaut) -->
<!-- =============================== -->
<section id="equipements" class="section">
  <h2>🔧 Équipements</h2>
  <div id="equipment-container"></div>
</section>

<section id="verrerie" class="section">
  <h2>🧃 Verrerie</h2>
  <div id="glassware-container"></div>
</section>

<section id="produits" class="section">
  <h2>🧴 Produits</h2>
  <div id="products-container"></div>
</section>

<script>
// Cache pour stocker les données chargées
const dataCache = {};
let currentIframe = null;

// Fonction pour basculer entre les sections
function switchSection(sectionId, element = null, isIframe = false) {
  // Masquer toutes les sections et l'iframe container
  document.querySelectorAll('.section').forEach(section => {
    section.classList.remove('active');
  });
  document.getElementById('iframe-container').style.display = 'none';

  // Désactiver tous les éléments de menu
  document.querySelectorAll('.menu-item').forEach(item => {
    item.classList.remove('active');
  });

  // Si c'est une iframe
  if (isIframe) {
    document.getElementById('iframe-container').style.display = 'block';
    document.getElementById('iframe-container').innerHTML = `
      <iframe src="${sectionId}" style="width: 100%; height: 100%; border: none;"></iframe>
    `;
    currentIframe = sectionId;
  }
  // Sinon c'est une section normale
  else {
    const section = document.getElementById(sectionId);
    if (section) {
      section.classList.add('active');

      // Activer l'élément de menu correspondant
      if (element) {
        element.classList.add('active');
      }

      // Charger le contenu si ce n'est pas déjà fait
      if (!dataCache[sectionId]) {
        loadSectionData(sectionId);
      }
    }
  }
}

// Fonction générique de chargement des données
async function loadSectionData(sectionId) {
  const container = document.getElementById(`${sectionId}-container`);
  container.innerHTML = '<p>Chargement en cours...</p>';

  try {
    let filePath = '';
    let variableName = '';
    let renderFunction = null;

    // Déterminer le fichier et la variable à charger
    switch(sectionId) {
      case 'equipements':
        filePath = 'data/equipment.js';
        variableName = 'laboratoryEquipment';
        renderFunction = renderEquipmentData;
        break;
      case 'verrerie':
        filePath = 'data/glassware.js';
        variableName = 'glassware';
        renderFunction = renderGlasswareData;
        break;
      case 'produits':
        filePath = 'data/products.js';
        variableName = 'products';
        renderFunction = renderProductsData;
        break;
      default:
        throw new Error('Section non reconnue');
    }

    // Charger le fichier JS avec gestion des exports
    const data = await loadJSData(filePath, variableName);
    dataCache[sectionId] = true;

    // Afficher les données
    renderFunction(data, container);

  } catch (error) {
    console.error(`Erreur chargement ${sectionId}:`, error);
    container.innerHTML = `
      <p style="color: red;">
        Erreur de chargement des données.<br>
        Vérifiez que le fichier existe et est au bon format.<br>
        ${error.message}
      </p>
    `;
  }
}

// Fonction pour charger les données JS avec gestion des exports
function loadJSData(filePath, variableName) {
  return new Promise((resolve, reject) => {
    fetch(filePath)
      .then(response => response.text())
      .then(text => {
        // Créer un script dynamique pour capturer les données
        const script = document.createElement('script');
        script.textContent = `
          window.__tempData__ = {};
          try {
            ${text.replace(/export\s+default\s+/, `window.__tempData__.${variableName} = `)}
          } catch (e) {
            console.error("Erreur d'exécution:", e);
          }
        `;
        document.body.appendChild(script);

        // Vérifier périodiquement si les données sont disponibles
        const checkData = setInterval(() => {
          if (window.__tempData__ && window.__tempData__[variableName]) {
            clearInterval(checkData);
            const data = window.__tempData__[variableName];
            delete window.__tempData__;
            document.body.removeChild(script);
            resolve(data);
          }
        }, 100);

        // Timeout de sécurité
        setTimeout(() => {
          clearInterval(checkData);
          document.body.removeChild(script);
          reject(new Error("Timeout lors du chargement des données"));
        }, 5000);
      })
      .catch(error => {
        reject(error);
      });
  });
}

// Fonction pour afficher les équipements
function renderEquipmentData(data, container) {
  // Regroupement par domaine
  const grouped = {};
  data.forEach(item => {
    if (!grouped[item.domaine]) grouped[item.domaine] = [];
    grouped[item.domaine].push(item);
  });

  container.innerHTML = '';
  for (const [domain, items] of Object.entries(grouped)) {
    const section = document.createElement('div');
    section.className = 'domain-section';
    section.innerHTML = `
      <h3>${getDomainEmoji(domain)} ${domain}</h3>
      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Description</th>
            <th>Lieu de stockage</th>
            <th>Notice</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(item => `
            <tr>
              <td>${item.nom}</td>
              <td>${item.description}</td>
              <td><input type="text" placeholder="Lieu de stockage"></td>
              <td><a href="${item.noticeUtilisation}" target="_blank">Notice</a></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    container.appendChild(section);
  }
}

// Fonction pour afficher la verrerie avec images
function renderGlasswareData(data, container) {
  // Catégoriser la verrerie
  const categories = {
    "Verrerie de base": [],
    "Ballons": [],
    "Mesure précise": [],
    "Transfert / séparation": [],
    "Chauffage / réaction": [],
    "Distillation": [],
    "Divers": [],
    "Verrerie spécialisée": []
  };

  // Répartir les items dans les catégories
  data.forEach(item => {
    if (item.nom.includes("Bécher") || item.nom.includes("Erlenmeyer") ||
        item.nom.includes("Fiole jaugée") || item.nom.includes("Éprouvette") ||
        item.nom.includes("Tube à essai")) {
      categories["Verrerie de base"].push(item);
    } else if (item.nom.includes("Ballon")) {
      categories["Ballons"].push(item);
    } else if (item.nom.includes("Burette") || item.nom.includes("Pipette")) {
      categories["Mesure précise"].push(item);
    } else if (item.nom.includes("Ampoule") || item.nom.includes("Entonnoir") ||
               item.nom.includes("Fiole à vide")) {
      categories["Transfert / séparation"].push(item);
    } else if (item.nom.includes("Réfrigérant") || item.nom.includes("Colonne")) {
      categories["Distillation"].push(item);
    } else if (item.nom.includes("Tube à essai gradué") || item.nom.includes("Tube de culture")) {
      categories["Chauffage / réaction"].push(item);
    } else if (item.nom.includes("Cristallisoir") || item.nom.includes("Verre de montre") ||
               item.nom.includes("Flacon") || item.nom.includes("Pissette")) {
      categories["Divers"].push(item);
    } else {
      categories["Verrerie spécialisée"].push(item);
    }
  });

  container.innerHTML = '';
  for (const [category, items] of Object.entries(categories)) {
    if (items.length > 0) {
      const section = document.createElement('div');
      section.className = 'glassware-category';
      section.innerHTML = `<h3>${category}</h3>`;

      const table = document.createElement('table');
      table.innerHTML = `
        <thead>
          <tr>
            <th>Nom</th>
            <th>Contenance</th>
            <th>Image</th>
            <th>Lieu de stockage</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(item => `
            <tr>
              <td>${item.nom}</td>
              <td>${item.contenance_ml || ''}</td>
              <td><img src="${item.image}" alt="${item.nom}" style="width: 80px; height: auto;"></td>
              <td><input type="text" placeholder="Lieu de stockage"></td>
            </tr>
          `).join('')}
        </tbody>
      `;
      section.appendChild(table);
      container.appendChild(section);
    }
  }
}

// Fonction pour afficher les produits
function renderProductsData(data, container) {
  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Nom</th>
          <th>Type</th>
          <th>Quantité</th>
          <th>Expiration</th>
          <th>Danger</th>
          <th>Lieu de stockage</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(item => `
          <tr>
            <td>${item.nom}</td>
            <td>${item.type || ''}</td>
            <td>${item.quantite || ''}</td>
            <td>${item.expiration || ''}</td>
            <td>${item.danger || ''}</td>
            <td><input type="text" placeholder="Lieu de stockage"></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// Emojis pour les domaines
function getDomainEmoji(domain) {
  const emojis = {
    "Électricité": "⚡", "Optique": "👁️", "Mécanique": "🔄",
    "Chimie": "🧪", "Thermique": "🌡️", "Signaux": "📡", "Sécurité": "🛡️"
  };
  return emojis[domain] || '';
}

// Écouteurs d'événements pour le menu
document.querySelectorAll('.menu-item').forEach(item => {
  item.addEventListener('click', (e) => {
    e.preventDefault();

    // Désactiver tous les éléments de menu
    document.querySelectorAll('.menu-item').forEach(i => {
      i.classList.remove('active');
    });

    // Activer l'élément cliqué
    item.classList.add('active');

    // Gérer le clic selon le type
    const sectionId = item.getAttribute('data-section');
    const iframeUrl = item.getAttribute('data-iframe');

    if (iframeUrl) {
      // C'est une iframe
      switchSection(iframeUrl, item, true);
    } else {
      // C'est une section normale
      switchSection(sectionId, item);
    }
  });
});

// Aucune section n'est affichée par défaut
</script>
