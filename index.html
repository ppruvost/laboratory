<!-- Conteneur pour les iframes -->
<div id="iframe-container" style="display: none; width: 100%; height: 70vh; border: none; margin-bottom: 20px;"></div>

<!-- =============================== -->
<!-- SECTIONS (toutes masquées par défaut) -->
<!-- =============================== -->
<section id="equipements" class="section">
  <h2>🔧 Équipements</h2>
  <div id="equipment-container"></div>
</section>

<section id="verrerie" class="section">
  <h2>🧃 Verrerie</h2>
  <div id="glassware-container"></div>
</section>

<section id="produits" class="section">
  <h2>🧴 Produits</h2>
  <div id="products-container"></div>
</section>

<script>
// Cache pour stocker les données chargées
const dataCache = {};
let currentIframe = null;

// Fonction pour basculer entre les sections
function switchSection(sectionId, element = null, isIframe = false) {
  // Masquer toutes les sections et l'iframe container
  document.querySelectorAll('.section').forEach(section => {
    section.classList.remove('active');
  });
  document.getElementById('iframe-container').style.display = 'none';

  // Désactiver tous les éléments de menu
  document.querySelectorAll('.menu-item').forEach(item => {
    item.classList.remove('active');
  });

  // Si c'est une iframe
  if (isIframe) {
    document.getElementById('iframe-container').style.display = 'block';
    document.getElementById('iframe-container').innerHTML = `
      <iframe src="${sectionId}" style="width: 100%; height: 100%; border: none;"></iframe>
    `;
    currentIframe = sectionId;
  }
  // Sinon c'est une section normale
  else {
    const section = document.getElementById(sectionId);
    if (section) {
      section.classList.add('active');

      // Charger le contenu si ce n'est pas déjà fait
      if (!dataCache[sectionId] && !section.querySelector('table')) {
        loadSectionData(sectionId);
      }
    }
  }

  // Activer l'élément de menu correspondant
  if (element) {
    element.classList.add('active');
  }
}

// Fonction générique de chargement des données
async function loadSectionData(sectionId) {
  const container = document.getElementById(`${sectionId}-container`);
  container.innerHTML = '<p>Chargement en cours...</p>';

  try {
    switch(sectionId) {
      case 'equipements':
        await loadEquipmentData();
        break;
      case 'verrerie':
        renderSimpleTable(
          ['Nom', 'Volume', 'Quantité', 'Lieu de stockage'],
          [
            {nom: 'Bécher', volume: '100 mL', quantite: 10},
            {nom: 'Éprouvette', volume: '50 mL', quantite: 15}
          ]
        );
        break;
      case 'produits':
        renderSimpleTable(
          ['Nom', 'Type', 'Quantité', 'Expiration', 'Lieu de stockage'],
          [
            {nom: 'Acide chlorhydrique', type: 'Acide', quantite: '2 L', expiration: '2027-06-30'},
            {nom: 'Soude', type: 'Base', quantite: '1 L', expiration: '2026-12-31'}
          ]
        );
        break;
    }
    dataCache[sectionId] = true;
  } catch (error) {
    console.error(`Erreur chargement ${sectionId}:`, error);
    container.innerHTML = `<p style="color: red;">Erreur de chargement</p>`;
  }

  function renderSimpleTable(headers, data) {
    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const tbody = document.createElement('tbody');

    thead.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
    table.appendChild(thead);

    data.forEach(item => {
      const row = document.createElement('tr');
      row.innerHTML = headers.map(h => {
        const key = h.toLowerCase().replace(' ', '-');
        return `<td>${item[key] || ''}</td>`;
      }).join('');
      tbody.appendChild(row);
    });

    table.appendChild(tbody);
    container.innerHTML = '';
    container.appendChild(table);
  }
}

// Chargement spécifique des équipements
async function loadEquipmentData() {
  const container = document.getElementById('equipment-container');

  try {
    const response = await fetch('data/equipment.js');
    const text = await response.text();

    const match = text.match(/const\s+laboratoryEquipment\s*=\s*\[([\s\S]*?)\];/);
    if (match) {
      const arrayText = `[${match[1]}]`;
      const equipmentList = JSON.parse(arrayText.replace(/(\w+):/g, '"$1":'));

      const grouped = {};
      equipmentList.forEach(item => {
        if (!grouped[item.domaine]) grouped[item.domaine] = [];
        grouped[item.domaine].push(item);
      });

      container.innerHTML = '';
      for (const [domain, items] of Object.entries(grouped)) {
        const section = document.createElement('div');
        section.innerHTML = `
          <h3>${getDomainEmoji(domain)} ${domain}</h3>
          <table>
            <thead>
              <tr>
                <th>Nom</th>
                <th>Description</th>
                <th>Lieu de stockage</th>
                <th>Notice</th>
              </tr>
            </thead>
            <tbody>
              ${items.map(item => `
                <tr>
                  <td>${item.nom}</td>
                  <td>${item.description}</td>
                  <td><input type="text" placeholder="Lieu de stockage"></td>
                  <td><a href="${item.noticeUtilisation}" target="_blank">Notice</a></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
        container.appendChild(section);
      }
    }
  } catch (error) {
    console.error('Erreur chargement équipements:', error);
    container.innerHTML = `<p style="color: red;">Erreur de chargement</p>`;
  }
}

// Emojis pour les domaines
function getDomainEmoji(domain) {
  const emojis = {
    "Électricité": "⚡", "Optique": "👁️", "Mécanique": "🔄",
    "Chimie": "🧪", "Thermique": "🌡️", "Signaux": "📡", "Sécurité": "🛡️"
  };
  return emojis[domain] || '';
}

// Écouteurs d'événements pour le menu
document.querySelectorAll('.menu-item').forEach(item => {
  item.addEventListener('click', (e) => {
    e.preventDefault();

    // Désactiver tous les éléments de menu
    document.querySelectorAll('.menu-item').forEach(i => {
      i.classList.remove('active');
    });

    // Activer l'élément cliqué
    item.classList.add('active');

    // Gérer le clic selon le type
    const sectionId = item.getAttribute('data-section');
    const iframeUrl = item.getAttribute('data-iframe');

    if (iframeUrl) {
      // C'est une iframe
      switchSection(iframeUrl, item, true);
    } else {
      // C'est une section normale
      switchSection(sectionId, item);
    }
  });
});

// Aucune section n'est affichée par défaut
</script>
