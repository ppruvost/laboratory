<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratory</title>

  <!-- CSS principal -->
  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
  >
</head>
<body>

  <!-- ================= MENU HORIZONTAL ================= -->
  <div class="top-menu">

    <div class="menu-item active" onclick="showSection('products', this)">
      <i class="fas fa-flask"></i> Réactifs
    </div>

    <div class="menu-item" onclick="showSection('equipment', this)">
      <i class="fas fa-plug"></i> Équipements
    </div>

    <div class="menu-item" onclick="showSection('glassware', this)">
      <i class="fas fa-vial"></i> Verrerie
    </div>

    <div class="menu-item" onclick="setActive(this); loadInFrame('https://ppruvost.github.io/periodic/')">
      <i class="fas fa-atom"></i> Table périodique
    </div>

    <div class="menu-item" onclick="setActive(this); loadInFrame('https://ppruvost.github.io/molecule/')">
      <i class="fas fa-cubes"></i> Molécules
    </div>

    <div class="menu-item" onclick="setActive(this); loadInFrame('https://ppruvost.github.io/Uncertainty/')">
      <i class="fas fa-ruler"></i> Mesures et Incertitudes
    </div>

  </div>

  <!-- ================= CONTENU ================= -->
  <div class="container">

    <!-- ================= RÉACTIFS ================= -->
    <div id="products" class="section active">
      <h2>Produits chimiques</h2>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>CAS</th>
              <th>Nom</th>
              <th>Formule</th>
              <th>Catégorie</th>
              <th>Localisation</th>
              <th>Pictogrammes</th>
              <th>Obligations</th>
              <th>Dangers</th>
              <th>Visuel</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <!-- ================= ÉQUIPEMENTS ================= -->
    <div id="equipment" class="section">
      <h2>Équipements</h2>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Domaine</th>
              <th>Nom</th>
              <th>Description</th>
              <th>Stockage</th>
              <th>Notice</th>
            </tr>
          </thead>
          <tbody id="equipment-body"></tbody>
        </table>
      </div>
    </div>

    <!-- ================= VERRERIE ================= -->
    <div id="glassware" class="section">
      <h2>Verrerie</h2>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nom</th>
              <th>Contenance</th>
              <th>Lieu</th>
              <th>Image</th>
            </tr>
          </thead>
          <tbody id="glassware-body"></tbody>
        </table>
      </div>
    </div>

    <!-- ================= CONTENU EXTERNE ================= -->
    <div id="external-content" class="section">
      <iframe id="external-frame"></iframe>
    </div>

  </div>

  <!-- IMPORTANT : fonctions globales pour onclick -->
  <script>
    function setActive(element) {
      document.querySelectorAll('.menu-item').forEach(item => {
        item.classList.remove('active');
      });
      element.classList.add('active');
    }

    function showSection(sectionId, element) {
      document.querySelectorAll('.section').forEach(section => {
        section.classList.remove('active');
      });

      const target = document.getElementById(sectionId);
      if (target) {
        target.classList.add('active');
      }

      setActive(element);
    }

    function loadInFrame(url) {
      document.querySelectorAll('.section').forEach(section => {
        section.classList.remove('active');
      });

      const externalSection = document.getElementById('external-content');
      const iframe = document.getElementById('external-frame');

      if (externalSection && iframe) {
        iframe.src = url;
        externalSection.classList.add('active');
      }
    }

    // rendre les fonctions accessibles au HTML inline onclick
    window.setActive = setActive;
    window.showSection = showSection;
    window.loadInFrame = loadInFrame;
  </script>

  <!-- JS principal -->
  <script type="module" src="app.js"></script>

</body>
</html>
