<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratory</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

<!-- ================= MENU HORIZONTAL ================= -->
<div class="top-menu">

    <div class="menu-item active" onclick="showSection('products', this)">
        <i class="fas fa-flask"></i> Réactifs
    </div>

    <div class="menu-item" onclick="showSection('equipment', this)">
        <i class="fas fa-plug"></i> Équipements
    </div>

    <div class="menu-item" onclick="showSection('glassware', this)">
        <i class="fas fa-vial"></i> Verrerie
    </div>

    <div class="menu-item" onclick="setActive(this); loadInFrame('https://ppruvost.github.io/periodic/')">
        <i class="fas fa-atom"></i> Table périodique
    </div>

    <div class="menu-item" onclick="setActive(this); loadInFrame('https://ppruvost.github.io/Uncertainty/')">
        <i class="fas fa-ruler"></i> Mesures et Incertitudes
    </div>

</div>

<!-- ================= CONTENU ================= -->
<div class="container">

    <!-- PRODUITS -->
    <div id="products" class="section active">
        <h2>Produits chimiques</h2>

        <table>
            <thead>
                <tr>
                    <th>CAS</th>
                    <th>Nom</th>
                    <th>Formule</th>
                    <th>Catégorie</th>
                    <th>Localisation</th>
                    <th>Pictogrammes</th>
                    <th>Dangers</th>
                    <th>Substitution</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <!-- ÉQUIPEMENTS -->
    <div id="equipment" class="section">
        <h2>Équipements</h2>

        <table>
            <thead>
                <tr>
                    <th>Domaine</th>
                    <th>Nom</th>
                    <th>Description</th>
                    <th>Stockage</th>
                    <th>Notice</th>
                </tr>
            </thead>
            <tbody id="equipment-body"></tbody>
        </table>
    </div>

    <!-- VERRERIE -->
    <div id="glassware" class="section">
        <h2>Verrerie</h2>

        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Contenance</th>
                    <th>Lieu</th>
                    <th>Image</th>
                </tr>
            </thead>
            <tbody id="glassware-body"></tbody>
        </table>
    </div>

    <!-- ================= IFRAME EXTERNE ================= -->
    <div id="external-content" class="section">
        <iframe id="external-frame"
            style="width:100%; height:90vh; border:none;">
        </iframe>
    </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
