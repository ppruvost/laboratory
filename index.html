<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Laboratoire - Data System</title>

  <!-- Feuille de style principale -->
  <link rel="stylesheet" href="style.css">

  <!-- Librairie d'icônes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<h1>🧪 Gestion du Laboratoire</h1>

<!-- =============================== -->
<!-- MENU HORIZONTAL FIXE EN HAUT -->
<!-- =============================== -->

<div class="menu-bar">

  <!-- BOUTON MENU -->
  <!-- active = section visible -->
  <div class="menu-item active" onclick="showSection('equipements', this)">
    <i class="fas fa-tools"></i>
    <span>Équipements</span>
  </div>

  <div class="menu-item" onclick="showSection('verrerie', this)">
    <i class="fas fa-flask"></i>
    <span>Verrerie</span>
  </div>

  <div class="menu-item" onclick="showSection('produits', this)">
    <i class="fas fa-vials"></i>
    <span>Produits</span>
  </div>

</div>

<!-- =============================== -->
<!-- SECTION ÉQUIPEMENTS -->
<!-- =============================== -->

<section id="equipements" class="section active">

  <h2>🔧 Équipements</h2>

  <table>
    <thead>
      <tr>
        <th>Nom</th>
        <th>Quantité</th>
        <th>État</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Balance</td>
        <td>2</td>
        <td>Bon</td>
      </tr>
    </tbody>
  </table>

</section>

<!-- =============================== -->
<!-- SECTION VERRERIE -->
<!-- =============================== -->

<section id="verrerie" class="section">

  <h2>🧫 Verrerie</h2>

  <table>
    <thead>
      <tr>
        <th>Nom</th>
        <th>Quantité</th>
        <th>État</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Bécher</td>
        <td>10</td>
        <td>Bon</td>
      </tr>
    </tbody>
  </table>

</section>

<!-- =============================== -->
<!-- SECTION PRODUITS -->
<!-- =============================== -->

<section id="produits" class="section">

  <h2>⚗️ Produits chimiques</h2>

  <table>
    <thead>
      <tr>
        <th>CAS</th>
        <th>Nom</th>
        <th>Formule</th>
        <th>Catégorie</th>
        <th>Localisation</th>
        <th>Pictogrammes</th>
        <th>Dangers</th>
        <th>Substitution</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

</section>

<script type="module" src="app.js"></script>

</body>
</html>
