<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Laboratoire - Data System</title>

  <!-- Feuille de style principale -->
  <link rel="stylesheet" href="style.css">

  <!-- Librairie d'icônes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<h1>🧪 Laboratoire Pédagogique - LP Jean Mermoz - Vire Normandie</h1>

<!-- =============================== -->
<!-- MENU HORIZONTAL FIXE EN HAUT -->
<!-- =============================== -->

<div class="menu-bar">

  <!-- BOUTON MENU -->
  <!-- active = section visible -->
  <div class="menu-item active" onclick="showSection('equipements', this)">
    <i class="fas fa-tools"></i>
    <span>Équipements</span>
  </div>

  <div class="menu-item" onclick="showSection('verrerie', this)">
    <i class="fas fa-flask"></i>
    <span>Verrerie</span>
  </div>

  <div class="menu-item" onclick="showSection('produits', this)">
    <i class="fas fa-vials"></i>
    <span>Produits</span>
  </div>

  <div class="menu-item" onclick="showIframe('https://ppruvost.github.io/periodic/', this)">
    <i class="fas fa-atom"></i>
    <span>Table périodique</span>
  </div>
  
  <div class="menu-item" onclick="showIframe('https://ppruvost.github.io/Uncertainty/', this)">
    <i class="fas fa-ruler"></i>
    <span>Mesures et Incertitudes</span>
</div>

</div>

<!-- =============================== -->
<!-- SECTION ÉQUIPEMENTS -->
<!-- =============================== -->

<section id="equipements" class="section active">
  <h2>🔧 Équipements</h2>
  <div id="equipment-container"></div>

  <script>
    // Importation dynamique du fichier equipment.js
    fetch('data/equipment.js')
      .then(response => response.text())
      .then(text => {
        // Extraction du tableau laboratoryEquipment
        const equipmentModule = {};
        eval(text); // Exécute le code JS pour définir laboratoryEquipment
        const equipmentList = equipmentModule.laboratoryEquipment || laboratoryEquipment;

        // Fonction pour regrouper les équipements par domaine
        function groupByDomain(equipments) {
          return equipments.reduce((acc, equipment) => {
            if (!acc[equipment.domaine]) {
              acc[equipment.domaine] = [];
            }
            acc[equipment.domaine].push(equipment);
            return acc;
          }, {});
        }

        // Regroupement des équipements par domaine
        const groupedEquipment = groupByDomain(equipmentList);

        // Création des sections et tableaux pour chaque domaine
        const container = document.getElementById('equipment-container');

        // Emojis pour chaque domaine
        const domainEmojis = {
          "Électricité": "⚡",
          "Optique": "👁️",
          "Mécanique": "🔄",
          "Chimie": "🧪",
          "Thermique": "🌡️",
          "Signaux": "📡",
          "Sécurité": "🛡️"
        };

        // Tri des domaines selon l'ordre souhaité
        const orderedDomains = ["Électricité", "Optique", "Mécanique", "Chimie", "Thermique", "Signaux", "Sécurité"];

        orderedDomains.forEach(domain => {
          if (groupedEquipment[domain]) {
            // Création de la section pour le domaine
            const domainSection = document.createElement('div');
            domainSection.className = 'domain-section';

            // Titre du domaine
            const domainTitle = document.createElement('h3');
            domainTitle.textContent = `${domainEmojis[domain] || ''} ${domain}`;
            domainSection.appendChild(domainTitle);

            // Création du tableau
            const table = document.createElement('table');
            const thead = document.createElement('thead');
            const tbody = document.createElement('tbody');

            // En-tête du tableau
            thead.innerHTML = `
              <tr>
                <th>Nom</th>
                <th>Description</th>
                <th>Lieu de stockage</th>
                <th>Notice d'utilisation</th>
              </tr>
            `;
            table.appendChild(thead);

            // Lignes du tableau
            groupedEquipment[domain].forEach(equipment => {
              const row = document.createElement('tr');
              row.innerHTML = `
                <td>${equipment.nom}</td>
                <td>${equipment.description}</td>
                <td><input type="text" placeholder="Lieu de stockage" data-equipment="${equipment.nom}"></td>
                <td><a href="${equipment.noticeUtilisation}" target="_blank">Notice</a></td>
              `;
              tbody.appendChild(row);
            });

            table.appendChild(tbody);
            domainSection.appendChild(table);
            container.appendChild(domainSection);
          }
        });
      })
      .catch(error => {
        console.error('Erreur lors du chargement des équipements:', error);
        document.getElementById('equipment-container').innerHTML = `
          <p style="color: red;">Erreur lors du chargement des équipements. Veuillez vérifier que le fichier <code>data/equipment.js</code> existe et est accessible.</p>
        `;
      });
  </script>
</section>

<!-- =============================== -->
<!-- SECTION VERRERIE -->
<!-- =============================== -->

<section id="verrerie" class="section">

  <h2>🧫 Verrerie</h2>

  <table>
    <thead>
      <tr>
        <th>Nom</th>
        <th>Contenance (mL)</th>
        <th>Lieu</th>
        <th>Image</th>
      </tr>
    </thead>
    <tbody id="verrerie-body">
      <!-- Rempli automatiquement -->
    </tbody>
  </table>

</section>

<!-- =============================== -->
<!-- SECTION PRODUITS -->
<!-- =============================== -->

<section id="produits" class="section">

  <h2>⚗️ Produits chimiques</h2>

  <table>
    <thead>
      <tr>
        <th>CAS</th>
        <th>Nom</th>
        <th>Formule</th>
        <th>Catégorie</th>
        <th>Localisation</th>
        <th>Pictogrammes</th>
        <th>Dangers</th>
        <th>Substitution</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

</section>

<!-- =============================== -->
<!-- IFRAME TABLE PERIODIQUE -->
<!-- =============================== -->

<section id="iframe-section" class="section">
  <iframe id="main-iframe" src="" style="width:100%; height:80vh; border:none;"></iframe>
</section>

<!-- =============================== -->
<!-- IFRAME UNCERTAINTY -->
<!-- =============================== -->

<section id="laboratory-section" class="section">

  <button 
    onclick="document.getElementById('main-iframe').src='https://ppruvost.github.io/Uncertainty/'"
    style="background:none; border:none; cursor:pointer; font-size:28px;"
    title="Mesures et Incertitudes"
  >
    📊 Mesures et Incertitudes
  </button>

</section>
  
<script type="module" src="app.js"></script>

</body>
</html>
