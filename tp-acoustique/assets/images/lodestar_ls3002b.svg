<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380" font-family="Arial, sans-serif">

  <!-- Corps principal -->
  <rect x="20" y="40" width="760" height="290" rx="8" ry="8" fill="white" stroke="black" stroke-width="2.5"/>
  <!-- Bandeau supérieur -->
  <rect x="20" y="40" width="760" height="28" rx="8" ry="8" fill="black" stroke="black" stroke-width="2"/>
  <rect x="20" y="54" width="760" height="14" fill="black"/>

  <!-- Étiquette principale -->
  <text x="36" y="60" font-size="11" font-weight="bold" fill="white">LODESTAR Electronics</text>
  <text x="170" y="60" font-size="13" font-weight="bold" fill="white">LS3002B</text>
  <text x="280" y="60" font-size="13" fill="white">FUNCTION GENERATOR</text>
  <text x="520" y="60" font-size="13" fill="white">2 MHz</text>

  <!-- Écran LCD -->
  <rect x="36" y="80" width="270" height="60" rx="3" fill="#1a1a1a" stroke="black" stroke-width="1.5"/>
  <text x="160" y="102" font-size="10" fill="#aaaaaa" text-anchor="middle">MHz</text>
  <text x="160" y="118" font-size="10" fill="#aaaaaa" text-anchor="middle">kHz</text>
  <text x="160" y="134" font-size="10" fill="#aaaaaa" text-anchor="middle">Hz</text>
  <text x="240" y="105" font-size="10" fill="#aaaaaa" text-anchor="middle">V</text>
  <text x="240" y="130" font-size="10" fill="#aaaaaa" text-anchor="middle">mV</text>

  <!-- Section POWER -->
  <rect x="36" y="155" width="95" height="75" rx="3" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="83" y="168" font-size="9" font-weight="bold" fill="black" text-anchor="middle">POWER</text>
  <!-- Bouton ON -->
  <rect x="44" y="174" width="30" height="18" rx="2" fill="#eeeeee" stroke="black" stroke-width="1"/>
  <text x="59" y="186" font-size="8" fill="black" text-anchor="middle">ON</text>
  <!-- Bouton OFF -->
  <rect x="82" y="174" width="30" height="18" rx="2" fill="#eeeeee" stroke="black" stroke-width="1"/>
  <text x="97" y="186" font-size="8" fill="black" text-anchor="middle">OFF</text>
  <!-- LED rouge -->
  <circle cx="59" cy="206" r="7" fill="#333" stroke="black" stroke-width="1.2"/>
  <text x="59" y="225" font-size="7" fill="black" text-anchor="middle">FREQ VAR</text>

  <!-- Section EXT COUNT -->
  <rect x="145" y="155" width="80" height="75" rx="3" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="185" y="168" font-size="8" font-weight="bold" fill="black" text-anchor="middle">EXT COUNT</text>
  <rect x="153" y="174" width="30" height="16" rx="2" fill="#eeeeee" stroke="black" stroke-width="1"/>
  <text x="168" y="185" font-size="8" fill="black" text-anchor="middle">EXT</text>
  <text x="185" y="225" font-size="7" fill="black" text-anchor="middle">EXT SIGNAL</text>

  <!-- Section RANGE Hz -->
  <rect x="238" y="155" width="175" height="75" rx="3" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="325" y="168" font-size="8" font-weight="bold" fill="black" text-anchor="middle">RANGE - Hz</text>
  <!-- Boutons de gamme -->
  <rect x="244" y="174" width="25" height="14" rx="1" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="257" y="184" font-size="7" fill="black" text-anchor="middle">20</text>
  <rect x="273" y="174" width="25" height="14" rx="1" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="286" y="184" font-size="7" fill="black" text-anchor="middle">200</text>
  <rect x="302" y="174" width="25" height="14" rx="1" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="315" y="184" font-size="7" fill="black" text-anchor="middle">2K</text>
  <rect x="331" y="174" width="25" height="14" rx="1" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="344" y="184" font-size="7" fill="black" text-anchor="middle">20K</text>
  <rect x="360" y="174" width="28" height="14" rx="1" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="374" y="184" font-size="7" fill="black" text-anchor="middle">200K</text>
  <rect x="392" y="174" width="16" height="14" rx="1" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="400" y="184" font-size="7" fill="black" text-anchor="middle">2M</text>
  <text x="325" y="225" font-size="7" fill="black" text-anchor="middle">VCF</text>

  <!-- Section FUNCTION -->
  <rect x="430" y="155" width="120" height="75" rx="3" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="490" y="168" font-size="8" font-weight="bold" fill="black" text-anchor="middle">FUNCTION</text>
  <!-- Boutons formes d'onde -->
  <rect x="438" y="174" width="28" height="16" rx="2" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="452" y="185" font-size="10" fill="black" text-anchor="middle">⊓</text>
  <rect x="472" y="174" width="28" height="16" rx="2" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="486" y="185" font-size="10" fill="black" text-anchor="middle">∿</text>
  <rect x="506" y="174" width="28" height="16" rx="2" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="520" y="185" font-size="10" fill="black" text-anchor="middle">∼</text>
  <text x="452" y="225" font-size="7" fill="black" text-anchor="middle">CMOS OUT</text>
  <text x="506" y="225" font-size="7" fill="black" text-anchor="middle">TTL OUT</text>

  <!-- Section ATTENUATOR -->
  <rect x="562" y="155" width="90" height="75" rx="3" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="607" y="168" font-size="8" font-weight="bold" fill="black" text-anchor="middle">ATTENUATOR</text>
  <rect x="568" y="174" width="35" height="16" rx="2" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="585" y="185" font-size="8" fill="black" text-anchor="middle">-20dB</text>
  <rect x="608" y="174" width="35" height="16" rx="2" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="625" y="185" font-size="8" fill="black" text-anchor="middle">-40dB</text>
  <text x="607" y="225" font-size="7" fill="black" text-anchor="middle">OUTPUT</text>

  <!-- Boutons rotatifs en haut à droite -->
  <!-- R/P -->
  <circle cx="680" cy="100" r="20" fill="#eeeeee" stroke="black" stroke-width="1.5"/>
  <line x1="680" y1="80" x2="680" y2="88" stroke="black" stroke-width="2"/>
  <text x="680" y="78" font-size="8" fill="black" text-anchor="middle">R/P</text>
  <text x="660" y="130" font-size="7" fill="black" text-anchor="middle">MIN</text>
  <text x="700" y="130" font-size="7" fill="black" text-anchor="middle">MAX</text>

  <!-- DC LEVEL -->
  <circle cx="720" cy="100" r="20" fill="#eeeeee" stroke="black" stroke-width="1.5"/>
  <line x1="720" y1="80" x2="720" y2="88" stroke="black" stroke-width="2"/>
  <text x="720" y="78" font-size="8" fill="black" text-anchor="middle">DC LEVEL</text>
  <text x="705" y="130" font-size="7" fill="black" text-anchor="middle">-</text>
  <text x="735" y="130" font-size="7" fill="black" text-anchor="middle">+</text>

  <!-- AMPLITUDE -->
  <circle cx="760" cy="100" r="20" fill="#eeeeee" stroke="black" stroke-width="1.5"/>
  <line x1="760" y1="80" x2="760" y2="88" stroke="black" stroke-width="2"/>
  <text x="760" y="78" font-size="8" fill="black" text-anchor="middle">AMPLITUDE</text>
  <text x="742" y="130" font-size="7" fill="black" text-anchor="middle">MIN</text>
  <text x="778" y="130" font-size="7" fill="black" text-anchor="middle">MAX</text>

  <!-- Boutons R/P et DC sous les potentiomètres -->
  <rect x="663" y="138" width="24" height="12" rx="2" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="675" y="147" font-size="7" fill="black" text-anchor="middle">R/P</text>
  <rect x="703" y="138" width="24" height="12" rx="2" fill="#eeeeee" stroke="black" stroke-width="0.8"/>
  <text x="715" y="147" font-size="7" fill="black" text-anchor="middle">DC</text>

  <!-- Bouton FREQ VAR (gros knob à gauche en bas) -->
  <circle cx="68" cy="283" r="22" fill="#eeeeee" stroke="black" stroke-width="2"/>
  <line x1="68" y1="261" x2="68" y2="270" stroke="black" stroke-width="2.5"/>
  <text x="68" y="316" font-size="7" fill="black" text-anchor="middle">FREQ VAR</text>

  <!-- Connecteurs BNC (bas) -->
  <!-- EXT SIGNAL -->
  <circle cx="185" cy="283" r="12" fill="white" stroke="black" stroke-width="1.8"/>
  <circle cx="185" cy="283" r="5" fill="#666" stroke="black" stroke-width="1"/>
  <text x="185" y="306" font-size="7" fill="black" text-anchor="middle">EXT.SIGNAL</text>

  <!-- VCF -->
  <circle cx="248" cy="283" r="12" fill="white" stroke="black" stroke-width="1.8"/>
  <circle cx="248" cy="283" r="5" fill="#666" stroke="black" stroke-width="1"/>
  <text x="248" y="306" font-size="7" fill="black" text-anchor="middle">VCF</text>

  <!-- CMOS LEVEL (petit bouton) -->
  <circle cx="310" cy="283" r="9" fill="#cccccc" stroke="black" stroke-width="1.5"/>
  <text x="310" y="306" font-size="7" fill="black" text-anchor="middle">CMOS LEVEL</text>

  <!-- CMOS OUT -->
  <circle cx="430" cy="283" r="12" fill="white" stroke="black" stroke-width="1.8"/>
  <circle cx="430" cy="283" r="5" fill="#666" stroke="black" stroke-width="1"/>
  <text x="430" y="306" font-size="7" fill="black" text-anchor="middle">CMOS OUT</text>

  <!-- TTL OUT -->
  <circle cx="530" cy="283" r="12" fill="white" stroke="black" stroke-width="1.8"/>
  <circle cx="530" cy="283" r="5" fill="#666" stroke="black" stroke-width="1"/>
  <text x="530" y="306" font-size="7" fill="black" text-anchor="middle">TTL OUT</text>

  <!-- OUTPUT (principal) -->
  <circle cx="660" cy="283" r="14" fill="white" stroke="black" stroke-width="2.5"/>
  <circle cx="660" cy="283" r="6" fill="#333" stroke="black" stroke-width="1.2"/>
  <text x="660" y="308" font-size="8" font-weight="bold" fill="black" text-anchor="middle">OUTPUT</text>

  <!-- Pied / support (trait bas) -->
  <line x1="20" y1="330" x2="780" y2="330" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Titre du schéma -->
  <text x="400" y="358" font-size="11" fill="black" text-anchor="middle" font-style="italic">Schéma face avant — Générateur de fonctions LODESTAR LS3002B (2 MHz)</text>
</svg>
