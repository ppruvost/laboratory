<div class="card">

<h2>

Générateur de fréquences

</h2>

<p>

Créer et analyser un signal sonore pur.

</p>


<div class="controls">

<label>

Fréquence :

</label>

<input
type="range"
id="freqSlider"
min="20"
max="5000"
value="440">

<span id="freqValue">

440 Hz

</span>

</div>


<div class="controls">

<label>

Volume :

</label>

<input
type="range"
id="gainSlider"
min="0"
max="1"
step="0.01"
value="0.3">

<span id="gainValue">

30 %

</span>

</div>


<div class="presets">

<button data-f="120">

grave.wav

<br>

120 Hz

</button>

<button data-f="700">

morse-beep.wav

<br>

700 Hz

</button>

<button data-f="1000">

aigu.wav

<br>

1000 Hz

</button>

</div>


<div class="buttons">

<button id="playBtn">

▶ Jouer

</button>

<button id="stopBtn">

■ Stop

</button>

<button id="exportBtn">

⬇ Export WAV

</button>

</div>


<div class="infos">

<p id="periodInfo">

Période :

</p>

<p id="soundType">

Type :

</p>

</div>


<h3>

Oscillogramme

</h3>

<canvas
id="waveCanvas"
width="900"
height="250">

</canvas>


<h3>

Spectre fréquentiel FFT

</h3>

<canvas
id="fftCanvas"
width="900"
height="250">

</canvas>

</div>
