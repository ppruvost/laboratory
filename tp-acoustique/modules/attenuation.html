<div class="card">

    <h2>Isolation phonique — simulation réaliste</h2>

    <div class="controls">

        <label>Environnement :</label>

        <select id="env">
            <option value="refectoire">Réfectoire</option>
            <option value="classe">Salle de classe</option>
            <option value="usine">Usine</option>
        </select>

    </div>

    <div class="controls">

        <label>Matériau murs :</label>

        <select id="wallMat">
            <option value="0.2">Mousse acoustique</option>
            <option value="0.5">Bois</option>
            <option value="0.8">Béton</option>
        </select>

    </div>

    <div class="controls">

        <label>Matériau plafond :</label>

        <select id="ceilingMat">
            <option value="0.2">Mousse</option>
            <option value="0.5">Plâtre</option>
            <option value="0.8">Béton armé</option>
        </select>

    </div>

    <div class="controls">

        <label>Distance source (m) :</label>

        <input id="distance" type="range" min="1" max="20" value="5">

        <span id="distVal">5 m</span>

    </div>

    <button id="testBtn">▶ Tester simulation</button>

    <div id="result" class="result"></div>

    <canvas id="canvas" width="900" height="350"></canvas>

</div>
