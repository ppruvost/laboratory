<div class="card">
    <h2>Plage auditive humaine</h2>

    <p>Utilise un casque 🎧. Trouve tes limites d’audition.</p>

    <input type="range" min="20" max="20000" value="440" id="freq">

    <p id="freqText">440 Hz</p>

    <button id="playBtn">Démarrer</button>
    <button id="stopBtn">Stop</button>

    <button id="hearBtn">🎧 J'entends</button>
    <button id="noHearBtn">🔇 Je n’entends plus</button>

    <canvas id="curve" width="500" height="300"></canvas>

    <p id="result"></p>
</div>

<script src="js/frequence.js"></script>
