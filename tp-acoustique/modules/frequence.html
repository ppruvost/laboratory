<div class="card">
    <h2>Fréquence et période</h2>
    <p>Modifier la fréquence.</p>

    <!-- Curseur pour la fréquence -->
    <input type="range" min="20" max="2000" value="440" id="freq">

    <!-- Affichage de la fréquence et de la période -->
    <p id="freqText">440 Hz</p>
    <p id="periodText"></p>

    <!-- Boutons Jouer/Stop -->
    <button id="playBtn">Jouer</button>
    <button id="stopBtn">Stop</button>

    <!-- Canvas pour l'oscilloscope -->
    <canvas id="oscillo"></canvas>

    <!-- Scripts -->
    <script src="../js/oscilloscope.js"></script>
    <script src="../js/frequence.js"></script>
</div>
