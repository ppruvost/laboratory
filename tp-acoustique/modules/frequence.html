<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TP - Plage auditive - Fréquences sonores</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .card {
            max-width: 900px;
            margin: auto;
        }

        canvas {
            border: 1px solid #000;
            margin-top: 15px;
        }

        button {
            margin: 5px;
        }

        input[type="range"] {
            width: 100%;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>TP : Plage auditive et audiogramme</h2>

    <p>
        🎧 Utilise un casque. Explore les sons graves et aigus.
        Détermine ta zone d’audition.
    </p>

    <!-- CURSEUR -->
    <input type="range" min="20" max="20000" value="440" id="freq">

    <p id="freqText">440 Hz</p>

    <!-- AUDIO -->
    <button id="playBtn">▶ Démarrer</button>
    <button id="stopBtn">⏹ Stop</button>

    <!-- MESURE -->
    <button id="hearBtn">🎧 J'entends</button>
    <button id="noHearBtn">🔇 Je n’entends plus</button>

    <!-- DIAGNOSTIC -->
    <button id="diagnoseBtn">🧠 Diagnostic</button>

    <!-- EXPORT -->
    <button id="exportPdf">📄 Export PDF</button>

    <!-- GRAPHE -->
    <canvas id="audiogram" width="800" height="400"></canvas>

    <p id="result"></p>

</div>

<script src="../js/frequence.js"></script>

</body>
</html>
