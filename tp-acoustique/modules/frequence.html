<div class="card">
    <h2>Fréquence et perception auditive</h2>

    <p>
        Utilise un casque 🎧. Fais varier la fréquence pour explorer les sons graves et aigus.
        Note à partir de quand tu entends le son.
    </p>

    <input type="range" min="20" max="20000" value="440" id="freq">

    <p id="freqText">440 Hz</p>
    <p id="periodText"></p>

    <button id="playBtn">Démarrer le son</button>
    <button id="stopBtn">Stop</button>

    <canvas id="oscillo" width="500" height="200"></canvas>

    <p id="info"></p>
</div>

<script src="js/frequence.js"></script>
