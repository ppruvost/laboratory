<div class="card">

<h2>

TP – Intensité sonore et perception auditive humaine

</h2>

<p>

Étudier l'influence de la fréquence, de l'intensité et de l'âge sur la perception sonore.

</p>

<div class="controls">

<label>

Fréquence :

</label>

<input
type="range"
id="freqSlider"
min="20"
max="20000"
value="1000">

<span id="freqValue">

1000 Hz

</span>

</div>

<div class="controls">

<label>

Intensité :

</label>

<input
type="range"
id="intensitySlider"
min="0.001"
max="1"
step="0.001"
value="0.30">

<span id="intensityValue">

0.300

</span>

</div>

<div class="controls">

<label>

Âge audition :

</label>

<select id="ageSelect">

<option value="20">

Jeune (20 ans)

</option>

<option value="40">

Adulte (40 ans)

</option>

<option value="60">

Senior (60 ans)

</option>

</select>

</div>

<div id="dbInfo"
class="result">

</div>

<div
id="danger"
class="result">

</div>

<canvas
id="canvas"
width="900"
height="400">

</canvas>

<div class="buttons">

<button id="startBtn">

▶ Son

</button>

<button id="stopBtn">

■ Stop

</button>

</div>

</div>
