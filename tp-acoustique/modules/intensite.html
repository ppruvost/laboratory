<div class="card">

    <h2>Intensité sonore</h2>

    <div class="controls">

        <label>Intensité :</label>

        <input
            type="range"
            id="intensitySlider"
            min="0"
            max="1"
            step="0.01"
            value="0.5">

        <span id="intensityValue">
            50 %
        </span>

    </div>

    <div class="result" id="dbInfo">
        Niveau estimé : --
    </div>

    <div style="
        width:100%;
        height:20px;
        background:#ddd;
        border-radius:10px;
        overflow:hidden;
        margin-top:15px;
    ">
        <div id="levelBar"
             style="
                height:100%;
                width:50%;
                background:#1f3c63;
                transition:0.2s;
             ">
        </div>
    </div>

    <div id="danger"></div>

    <div class="buttons">
        <button id="startBtn">▶ Activer son</button>
        <button id="stopBtn">■ Stop</button>
    </div>

</div>
