<div class="card">

    <h2>Intensité sonore (dB SPL)</h2>

    <div class="controls">

        <label>Intensité (relative) :</label>

        <input
            type="range"
            id="intensitySlider"
            min="0.0001"
            max="1"
            step="0.0001"
            value="0.3">

        <span id="intensityValue">--</span>

    </div>

    <div id="dbInfo" class="result"></div>

    <div style="
        width:100%;
        height:20px;
        background:#ddd;
        border-radius:10px;
        overflow:hidden;
        margin-top:15px;
    ">
        <div id="levelBar"
             style="
                height:100%;
                width:30%;
                background:#1f3c63;
                transition:0.2s;
             ">
        </div>
    </div>

    <div id="danger" style="margin-top:15px;font-weight:bold;"></div>

    <div class="buttons">
        <button id="startBtn">▶ Son</button>
        <button id="stopBtn">■ Stop</button>
    </div>

</div>
