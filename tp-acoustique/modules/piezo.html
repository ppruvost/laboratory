<div class="card">

    <h2>TP – Capteur piézoélectrique</h2>

    <p>Simulation d'une vibration mécanique amortie.</p>

    <button id="impact">Créer un choc</button>

    <label>
        Amortissement :
        <input
            id="damping"
            type="range"
            min="20"
            max="300"
            value="100">
    </label>

    <p>Amplitude maximale :
        <span id="piezoVal">0</span> V
    </p>

    <p>Fréquence :
        <span id="freqVal">0</span> Hz
    </p>

    <canvas
        id="piezoCanvas"
        width="900"
        height="250">
    </canvas>

</div>
