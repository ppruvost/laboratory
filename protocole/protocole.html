<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fiches TP Chimie</title>

  <link rel="stylesheet" href="./protocole.css">

  <link rel="icon" href="data:,">

 <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header>
  <h1>Fiches de préparation TP Chimie</h1>
</header>

<section class="panel">

  <h2>🧪 Calcul de dilution</h2>

  <div class="grid">
    <label>C₁ (mol/L)</label>
    <input id="c1" type="number">

    <label>C₂ (mol/L)</label>
    <input id="c2" type="number">

    <label>V₂ (mL)</label>
    <input id="v2" type="number">

    <button onclick="calculerDilution()">Calculer V₁</button>

    <div id="resultatDilution"></div>
  </div>

</section>

<section class="panel">

  <h2>📦 Fiche de préparation</h2>

  <label>Réactif (stock)</label>
  <select id="reactif"></select>

  <label>Concentration (mol/L)</label>
  <input id="concentration" type="number" step="0.01">

  <label>Volume final (mL)</label>
  <input id="volume" type="number">

  <button onclick="genererFiche()">Générer fiche</button>
  <button onclick="exportPDF()">Exporter PDF</button>

</section>

<section id="fiche" class="fiche">
  <h2>FICHE DE PRÉPARATION</h2>
  <div id="ficheContent"></div>
</section>

<!-- IMPORTANT : chemin corrigé -->
<script type="module" src="./protocole.js"></script>

</body>
</html>
