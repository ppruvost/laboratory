<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de protocoles TP</title>

<link rel="stylesheet" href="protocole.css">

<script type="module" src="protocole.js"></script>

<script src="libs/html2canvas.min.js"></script>
<script src="libs/jspdf.min.js"></script>

</head>

<body>

<header>
<h1>🧪 Générateur de protocoles TP</h1>
<p>Préparation des solutions – Bac Pro Sciences</p>
</header>

<main>

<section class="panel">

<h2>Choix du réactif</h2>

<select id="reactif"></select>

<h2>Type de préparation</h2>

<select id="typePrep">
<option value="molaire">Solution molaire</option>
<option value="massique">Solution massique</option>
<option value="dilution">Dilution</option>
<option value="auto">Protocole automatique</option>
</select>

<div id="blocMolaire">

<h3>Molaire</h3>

<label>C (mol/L)</label>
<input id="C" type="number" step="0.01">

<label>V (mL)</label>
<input id="V" type="number" value="1000">

</div>

<div id="blocMassique" class="hidden">

<h3>Massique</h3>

<label>Cm (g/L)</label>
<input id="Cm" type="number" step="0.1">

<label>V (mL)</label>
<input id="Vm" type="number" value="1000">

</div>

<div id="blocDilution" class="hidden">

<h3>Dilution</h3>

<label>C₁</label>
<input id="C1" type="number">

<label>C₂</label>
<input id="C2" type="number">

<label>V₂ (mL)</label>
<input id="V2" type="number">

</div>

<button id="generer">Générer</button>

<button id="export">📄 PDF</button>

</section>

<section id="fiche"></section>

</main>

</body>
</html>
