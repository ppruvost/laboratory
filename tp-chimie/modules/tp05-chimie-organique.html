<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TP 05 — Chimie organique</title>
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/tp.css">
</head>
<body>

<h1>TP 05 — Chimie organique</h1>

<div id="securite-bloc"></div>

<section>
<h2>Fonctions organiques</h2>
<div id="cartes-fonctions"></div>
</section>

<section>
<h2>Test de Fehling interactif</h2>
<select id="sel-fehling"></select>
<button id="btn-fehling">🧪 Ajouter le réactif de Fehling</button>
<div id="tube-fehling" style="height:120px;background:#1B6CA8;border-radius:10px;margin:1rem 0"></div>
<div id="res-fehling"></div>
</section>

<section>
<h2>Calculateur d'estérification</h2>
<form id="form-ester-calc">
<p><label>Volume acide <input id="v-acide" type="number" value="10"></label></p>
<p><label>Densité acide <input id="d-acide" type="number" step="0.01" value="1.05"></label></p>
<p><label>Masse molaire acide <input id="m-acide" type="number" step="0.01" value="60.05"></label></p>

<p><label>Volume alcool <input id="v-alcool" type="number" value="10"></label></p>
<p><label>Densité alcool <input id="d-alcool" type="number" step="0.01" value="0.81"></label></p>
<p><label>Masse molaire alcool <input id="m-alcool" type="number" step="0.01" value="88.15"></label></p>

<p><label>Masse molaire ester <input id="m-ester" type="number" step="0.01" value="130.19"></label></p>
</form>

<div id="res-calc-ester"></div>
</section>

<section>
<h2>Calcul du rendement</h2>
<p><label>Masse théorique <input id="m-ester-theo" type="number" step="0.001"></label></p>
<p><label>Masse expérimentale <input id="m-ester-exp" type="number" step="0.001"></label></p>
<div id="res-rendement"></div>
</section>

<section>
<h2>Chromatographie CCM</h2>
<canvas id="canvas-ccm" style="width:100%;max-width:700px;border:1px solid #ccc"></canvas>
<p><button id="btn-eluer">▶ Lancer l'élution</button></p>
</section>

<section>
<h2>Quiz des fonctions organiques</h2>
<button id="btn-quiz-fonctions">Nouvelle question</button>
<button id="btn-quiz-fonctions-reset">Réinitialiser</button>
<p>Score : <span id="qf-score">0</span> / <span id="qf-total">0</span></p>
<div id="quiz-fonctions-zone"></div>
</section>

<section>
<h2>Esters et odeurs</h2>
<div id="galerie-esters"></div>
</section>

<script type="module">
import { init } from '../js/tp05-chimie-organique.js';
document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
