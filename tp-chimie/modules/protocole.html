<div class="module-protocole">

    <header class="module-header">
        <h1>🧪 Fiches de préparation TP Chimie</h1>
    </header>

    <div class="container">

        <!-- COLONNE GAUCHE -->
        <div class="sidebar">

            <!-- ========================================= -->
            <!-- CALCUL DE DILUTION -->
            <!-- ========================================= -->

            <section class="panel section">

                <div class="section-titre">
                    <h2>📐 Calcul de dilution</h2>
                    <span class="chevron">▼</span>
                </div>

                <div class="section-corps">

                    <div class="grid">

                        <div class="ligne">
                            <label for="c1">C₁ (mol·L⁻¹)</label>
                            <input id="c1" type="number" step="0.001">
                        </div>

                        <div class="ligne">
                            <label for="c2">C₂ (mol·L⁻¹)</label>
                            <input id="c2" type="number" step="0.001">
                        </div>

                        <div class="ligne">
                            <label for="v2">V₂ (mL)</label>
                            <input id="v2" type="number" step="1">
                        </div>

                        <button onclick="calculerDilution()">
                            Calculer V₁
                        </button>

                        <div
                            id="resultatDilution"
                            class="resultat">
                        </div>

                    </div>

                </div>

            </section>

            <!-- ========================================= -->
            <!-- FICHE PREPARATION -->
            <!-- ========================================= -->

            <section class="panel section">

                <div class="section-titre">
                    <h2>🧪 Fiche de préparation</h2>
                    <span class="chevron">▼</span>
                </div>

                <div class="section-corps">

                    <label for="reactif">
                        Choix du réactif
                    </label>

                    <select id="reactif">
                        <option>
                            Chargement...
                        </option>
                    </select>

                    <label for="concentration">
                        Concentration cible (mol·L⁻¹)
                    </label>

                    <input
                        id="concentration"
                        type="number"
                        step="0.001"
                    >

                    <label for="volume">
                        Volume final (mL)
                    </label>

                    <input
                        id="volume"
                        type="number"
                        step="1"
                    >

                    <button onclick="genererFiche()">
                        Générer la fiche
                    </button>

                    <button onclick="exportPDF()">
                        Exporter PDF
                    </button>

                </div>

            </section>

        </div>

        <!-- ========================================= -->
        <!-- FICHE -->
        <!-- ========================================= -->

        <section
            id="fiche"
            class="fiche section">

            <div class="section-titre">
                <h2>📄 FICHE DE PRÉPARATION</h2>
                <span class="chevron">▼</span>
            </div>

            <div class="section-corps">

                <div id="ficheContent">

                    <p class="placeholder">
                        Sélectionner un réactif puis générer la fiche.
                    </p>

                </div>

            </div>

        </section>

    </div>

</div>
